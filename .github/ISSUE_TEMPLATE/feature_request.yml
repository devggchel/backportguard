name: Feature request
description: Propose a focused improvement
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: dropdown
    id: automation
    attributes:
      label: Should this apply code automatically?
      options:
        - "No — BackportGuard should remain reminder-only"
        - "Needs discussion"
    validations:
      required: true
