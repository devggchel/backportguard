name: Bug report
description: Report a reproducible BackportGuard problem
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Please remove secrets, delivery payloads, and private repository URLs before submitting."
  - type: textarea
    id: observed
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include version and non-sensitive configuration only.
    validations:
      required: true
